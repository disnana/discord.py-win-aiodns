name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and CI tools
        run: python -m pip install --upgrade pip ".[dev]"
      - name: Check formatting and imports
        run: python -m ruff check .
      - name: Check types
        run: python -m mypy
      - name: Run tests with coverage
        run: python -m pytest --cov=discord_win_aiodns --cov-report=term-missing
      - name: Audit installed dependencies
        run: python -m pip_audit --strict --cache-dir .pip-audit-cache
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
