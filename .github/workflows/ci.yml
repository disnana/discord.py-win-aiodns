name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and CI tools
        run: python -m pip install --upgrade pip -e ".[dev]"
      - name: Check formatting and imports
        run: python -m ruff check .
      - name: Check types
        run: python -m mypy
      - name: Run tests with coverage
        run: python -m pytest --cov=discord_win_aiodns --cov-report=term-missing --cov-fail-under=80
      - name: Audit installed dependencies
        shell: pwsh
        run: |
          python -c "import tomllib; from pathlib import Path; data = tomllib.load(open('pyproject.toml', 'rb')); dependencies = data['project']['dependencies'] + data['project']['optional-dependencies']['dev']; Path('.audit-requirements.txt').write_text('\n'.join(dependencies), encoding='utf-8')"
          python -m pip_audit --strict --requirement .audit-requirements.txt --cache-dir .pip-audit-cache
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/discord-py-win-aiodns
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: version
        name: Compare the local version with PyPI
        run: |
          python -m pip install --upgrade packaging
          python - <<'PY'
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request
          from packaging.version import Version

          with open('pyproject.toml', 'rb') as file:
              project = tomllib.load(file)['project']

          name = project['name']
          local_version = Version(project['version'])

          try:
              with urllib.request.urlopen(f'https://pypi.org/pypi/{name}/json') as response:
                  releases = json.load(response)['releases']
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              releases = {}

          published = [Version(version) for version, files in releases.items() if files]
          if not published:
              publish = True
          else:
              latest = max(published)
              if local_version == latest:
                  publish = False
              elif local_version < latest:
                  raise SystemExit(f'Local version {local_version} is older than PyPI version {latest}.')
              else:
                  publish = True

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'publish={str(publish).lower()}\n')
          PY
      - name: Build distributions
        if: steps.version.outputs.publish == 'true'
        run: python -m pip install --upgrade build && python -m build
      - name: Check distribution metadata
        if: steps.version.outputs.publish == 'true'
        run: python -m pip install --upgrade twine && python -m twine check dist/*
      - name: Publish to PyPI
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
